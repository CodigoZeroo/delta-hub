<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos visuales exactos para las tarjetas de tus scripts */
        .script-card {
            background: #161622; 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 20px; 
            text-align: left; 
            border: 1px solid #2a2a3a;
        }
        .script-title {
            color: #00ff88; 
            margin: 0 0 10px 0; 
            font-size: 1.3rem;
        }
        .script-box {
            background: #000; 
            color: #00ff88; 
            padding: 15px; 
            border-radius: 6px; 
            overflow-x: auto; 
            font-family: monospace; 
            border: 1px solid #111;
            white-space: pre-wrap;
        }
        .btn-copy {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-copy:hover {
            background: #00cc6a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <!-- Cuadro indicador del estado de Firebase -->
        <div class="status" id="db-status">Iniciando Firebase...</div>

        <!-- En este contenedor se dibujarán tus scripts reales de forma automática -->
        <div id="contenedor-scripts"></div>
    </div>

    <!-- CARGA DE LIBRERÍAS COMPATIBLES DE GOOGLE (SIN ERRORES DE IMPORTACIÓN) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // Tus credenciales 100% completas y corregidas de deltascripts-1
        const firebaseConfig = {
            apiKey: "AIzaSyCyxJWklgJAAMwmhSw9jF3CMsJXbF99CeA",
            authDomain: "deltascripts-1.firebaseapp.com",
            projectId: "deltascripts-1",
            storageBucket: "deltascripts-1.firebasestorage.app",
            messagingSenderId: "735316669110",
            appId: "1:735316669110:web:33f580d583a462ee2cac17",
            measurementId: "G-90E1DSBCWY"
        };

        // Encendido automático del sistema
        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const statusElemento = document.getElementById('db-status');
            const contenedor = document.getElementById('contenedor-scripts');

            statusElemento.innerText = "Conectado. Cargando scripts desde Firebase...";

            // Consultar tu colección de Google llamada "scripts"
            db.collection("scripts").get().then((respuesta) => {
                
                if (respuesta.empty) {
                    statusElemento.innerText = "Conectado a Firebase.";
                    contenedor.innerHTML = "<div class='status' style='background: #332200; color: #ffaa00;'>Tu colección 'scripts' está vacía en Firebase. Agrega un documento en tu panel de Google.</div>";
                    return;
                }

                // Si todo sale bien, ocultamos el aviso de carga e iniciamos el dibujo
                statusElemento.style.display = "none";
                contenedor.innerHTML = "";

                let contador = 0;
                respuesta.forEach((doc) => {
                    contador++;
                    const item = doc.data();
                    const idUnico = "script-code-" + contador;
                    const nombre = item.nombre || "Script sin nombre";
                    const contenido = item.contenido || "-- Vacío";

                    // Insertamos la tarjeta de cada script que tengas guardado
                    contenedor.innerHTML += `
                        <div class="script-card">
                            <h3 class="script-title">🚀 ${nombre}</h3>
                            <div class="script-box" id="${idUnico}">${contenido}</div>
                            <button class="btn-copy" onclick="copiarScript('${idUnico}')">Copiar Script</button>
                        </div>
                    `;
                });

            }).catch((errorReglas) => {
                statusElemento.style.background = "#331111";
                statusElemento.style.color = "#ff4444";
                statusElemento.innerText = "Error de permisos en Firebase. Revisa tus Reglas.";
                console.error(errorReglas);
            });

        } catch (errorArranque) {
            document.getElementById('db-status').innerText = "Error crítico de configuración: " + errorArranque.message;
        }

        // Función del botón para copiar al portapapeles de los usuarios
        function copiarScript(id) {
            const codigo = document.getElementById(id).innerText;
            navigator.clipboard.writeText(codigo);
            alert("¡Script copiado al portapapeles con éxito!");
        }
    </script>

</body>
</html>
