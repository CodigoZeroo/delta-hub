<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <!-- Aquí se forzará la carga de los scripts -->
        <div id="contenedor-principal">
            <div class="status" id="db-status">Iniciando conexión segura...</div>
        </div>
    </div>

    <!-- SISTEMA DE IMPORTACIÓN MODERNO 2026 -->
    <script type="module">
        // Importamos directamente el módulo listo para usar
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, getDocs } from "https://gstatic.com";

        // Tus credenciales reales de deltascripts-1
        const firebaseConfig = {
            apiKey: "AIzaSyCyxJWklgJAAMwmhSw9jF3CMsJXbF99CeA",
            authDomain: "://firebaseapp.com",
            projectId: "deltascripts-1",
            storageBucket: "deltascripts-1.firebasestorage.app",
            messagingSenderId: "735316669110",
            appId: "1:735316669110:web:33f580d583a462ee2cac17",
            measurementId: "G-90E1DSBCWY"
        };

        async function conectarFirebase() {
            const statusElemento = document.getElementById('db-status');
            const contenedor = document.getElementById('contenedor-principal');

            try {
                // 1. Inicializar la app con sus credenciales
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                
                statusElemento.innerText = "Conectado. Descargando tus scripts...";

                // 2. Traer los scripts de la colección
                const respuesta = await getDocs(collection(db, "scripts"));
                
                if (respuesta.empty) {
                    contenedor.innerHTML = "<div class='status' style='background: #332200; color: #ffaa00;'>Conectado a Firebase, pero tu colección 'scripts' está vacía. Añade un documento en tu panel de Google.</div>";
                    return;
                }

                // 3. Mostrar los scripts en tarjetas web
                contenedor.innerHTML = "";
                respuesta.forEach((doc) => {
                    const item = doc.data();
                    contenedor.innerHTML += `
                        <div style="background: #161622; padding: 20px; border-radius: 8px; margin-top: 15px; text-align: left; border: 1px solid #2a2a3a;">
                            <h3 style="color: #00ff88; margin: 0 0 10px 0; font-size: 1.3rem;">${item.nombre || 'Script sin nombre'}</h3>
                            <pre style="background: #000; color: #00ff88; padding: 15px; border-radius: 6px; overflow-x: auto; font-family: monospace; border: 1px solid #111;"><code>${item.contenido || '-- Vacío'}</code></pre>
                        </div>
                    `;
                });

            } catch (error) {
                statusElemento.style.background = "#331111";
                statusElemento.style.color = "#ff4444";
                statusElemento.style.border = "1px solid #ff4444";
                statusElemento.innerText = "Error de Firebase: " + error.message;
            }
        }

        // Arrancar el proceso automáticamente
        conectarFirebase();
    </script>

</body>
</html>
