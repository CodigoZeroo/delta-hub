<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos exactos para tus tarjetas oscuras */
        .script-card {
            background: #161622; 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 20px; 
            text-align: left; 
            border: 1px solid #2a2a3a;
        }
        .script-title {
            color: #00ff88; 
            margin: 0 0 10px 0; 
            font-size: 1.3rem;
        }
        .script-box {
            background: #000; 
            color: #00ff88; 
            padding: 15px; 
            border-radius: 6px; 
            overflow-x: auto; 
            font-family: monospace; 
            border: 1px solid #111;
            white-space: pre-wrap;
        }
        .btn-copy {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-copy:hover {
            background: #00cc6a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <!-- Indicador de estado rápido -->
        <div class="status" id="db-status">Sincronizando con la nube...</div>

        <!-- Contenedor donde aparecerán tus scripts de Firebase -->
        <div id="contenedor-scripts"></div>
    </div>

    <script>
        // Conexión limpia mediante API REST (Cero librerías externas)
        const PROJECT_ID = "deltascripts-1";
        const statusElemento = document.getElementById('db-status');
        const contenedor = document.getElementById('contenedor-scripts');

        async function obtenerScriptsDesdeNube() {
            try {
                // Consultamos directamente el endpoint de la base de datos de Google sin intermediarios
                const url = `https://googleapis.com{PROJECT_ID}/databases/(default)/documents/scripts`;
                const respuesta = await fetch(url);
                
                if (!respuesta.ok) {
                    throw new Error("No se obtuvo respuesta del servidor remoto.");
                }

                const datos = await respuesta.json();

                // Si la colección de Firebase no tiene documentos creados
                if (!datos.documents || datos.documents.length === 0) {
                    statusElemento.innerText = "Conexión exitosa.";
                    contenedor.innerHTML = "<div class='status' style='background: #332200; color: #ffaa00;'>Tu colección 'scripts' está vacía en Firebase. Agrega un documento desde el panel web de Google.</div>";
                    return;
                }

                // Limpiamos la pantalla e imprimimos tus scripts reales
                statusElemento.style.display = "none";
                contenedor.innerHTML = "";

                let contador = 0;
                datos.documents.forEach((doc) => {
                    contador++;
                    const campos = doc.fields;
                    const idUnico = "script-code-" + contador;
                    
                    // Extraemos los textos de tus campos de Firebase
                    const nombre = campos.nombre && campos.nombre.stringValue ? campos.nombre.stringValue : 'Script sin nombre';
                    const contenido = campos.contenido && campos.contenido.stringValue ? campos.contenido.stringValue : '-- Vacío';

                    contenedor.innerHTML += `
                        <div class="script-card">
                            <h3 class="script-title">🚀 ${nombre}</h3>
                            <div class="script-box" id="${idUnico}">${contenido}</div>
                            <button class="btn-copy" onclick="copiarScript('${idUnico}')">Copiar Script</button>
                        </div>
                    `;
                });

            } catch (error) {
                statusElemento.style.background = "#331111";
                statusElemento.style.color = "#ff4444";
                statusElemento.innerText = "Error de sincronización: " + error.message;
            }
        }

        // Ejecutar la petición al cargar la web
        obtenerScriptsDesdeNube();

        // Función del botón para copiar al portapapeles
        function copiarScript(id) {
            const codigo = document.getElementById(id).innerText;
            navigator.clipboard.writeText(codigo);
            alert("¡Script copiado al portapapeles con éxito!");
        }
    </script>

</body>
</html>
