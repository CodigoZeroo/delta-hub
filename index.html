<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">

    <!-- CARGA INMEDIATA Y ULTRA-ESTABLE DESDE GOOGLE (MÉTODO CLÁSICO) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <!-- Aquí se forzará la carga de los scripts -->
        <div id="contenedor-principal">
            <div class="status" id="db-status">Iniciando sistema seguro...</div>
        </div>
    </div>

    <script>
        // Tus credenciales reales de deltascripts-1
        var firebaseConfig = {
            apiKey: "AIzaSyCyxJWklgJAAMwmhSw9jF3CMsJXbF99CeA",
            authDomain: "://firebaseapp.com",
            projectId: "deltascripts-1",
            storageBucket: "deltascripts-1.firebasestorage.app",
            messagingSenderId: "735316669110",
            appId: "1:735316669110:web:33f580d583a462ee2cac17",
            measurementId: "G-90E1DSBCWY"
        };

        // Forzar arranque del motor
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
            
            document.getElementById('db-status').innerText = "Conectado. Descargando tus scripts...";

            // Leer la colección de scripts
            db.collection("scripts").get().then(function(respuesta) {
                var contenedor = document.getElementById('contenedor-principal');
                
                if (respuesta.empty) {
                    contenedor.innerHTML = "<div class='status' style='background: #332200; color: #ffaa00;'>Conectado a Firebase, pero tu colección 'scripts' está vacía en el panel de Google.</div>";
                    return;
                }

                // Dibujar scripts en la pantalla
                contenedor.innerHTML = "";
                respuesta.forEach(function(doc) {
                    var item = doc.data();
                    contenedor.innerHTML += `
                        <div style="background: #161622; padding: 20px; border-radius: 8px; margin-top: 15px; text-align: left; border: 1px solid #2a2a3a;">
                            <h3 style="color: #00ff88; margin: 0 0 10px 0; font-size: 1.3rem;">${item.nombre || 'Script sin nombre'}</h3>
                            <pre style="background: #000; color: #00ff88; padding: 15px; border-radius: 6px; overflow-x: auto; font-family: monospace; border: 1px solid #111;"><code>${item.contenido || '-- Vacío'}</code></pre>
                        </div>
                    `;
                });

            }).catch(function(errorDeReglas) {
                document.getElementById('db-status').style.background = "#331111";
                document.getElementById('db-status').style.color = "#ff4444";
                document.getElementById('db-status').innerText = "Error en reglas de Firebase: " + errorDeReglas.message;
            });

        } catch (errorDeArranque) {
            document.getElementById('db-status').innerText = "Error al iniciar Google SDK: " + errorDeArranque.message;
        }
    </script>

</body>
</html>
