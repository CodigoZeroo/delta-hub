<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .script-card {
            background: #161622; 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 20px; 
            text-align: left; 
            border: 1px solid #2a2a3a;
        }
        .script-title {
            color: #00ff88; 
            margin: 0 0 10px 0; 
            font-size: 1.3rem;
        }
        .script-box {
            background: #000; 
            color: #00ff88; 
            padding: 15px; 
            border-radius: 6px; 
            overflow-x: auto; 
            font-family: monospace; 
            border: 1px solid #111;
            white-space: pre-wrap;
        }
        .btn-copy {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-copy:hover {
            background: #00cc6a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <div class="status" id="db-status">Cargando base de datos local...</div>
        <div id="contenedor-scripts"></div>
    </div>

    <script>
        const statusElemento = document.getElementById('db-status');
        const contenedor = document.getElementById('contenedor-scripts');

        async function cargarScriptsLocales() {
            try {
                // Al leer un archivo propio del mismo repositorio, el navegador jamás lo bloquea
                const respuesta = await fetch('lista.json');
                if (!respuesta.ok) throw new Error("No se pudo leer el archivo lista.json");
                
                const datos = await respuesta.json();

                statusElemento.style.display = "none";
                contenedor.innerHTML = "";

                let contador = 0;
                datos.forEach((item) => {
                    contador++;
                    const idUnico = "script-code-" + contador;

                    contenedor.innerHTML += `
                        <div class="script-card">
                            <h3 class="script-title">🚀 ${item.nombre}</h3>
                            <div class="script-box" id="${idUnico}">${item.contenido}</div>
                            <button class="btn-copy" onclick="copiarScript('${idUnico}')">Copiar Script</button>
                        </div>
                    `;
                });

            } catch (error) {
                statusElemento.style.background = "#331111";
                statusElemento.style.color = "#ff4444";
                statusElemento.innerText = "Error: " + error.message;
            }
        }

        cargarScriptsLocales();

        function copiarScript(id) {
            const codigo = document.getElementById(id).innerText;
            navigator.clipboard.writeText(codigo);
            alert("¡Script copiado al portapapeles con éxito!");
        }
    </script>

</body>
</html>
