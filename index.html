<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">

    <!-- SDK Oficial de Firebase unificado para navegadores modernos sin usar módulos -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <!-- Zona de carga dinámica -->
        <div id="contenedor-principal">
            <div class="status" id="db-status">Iniciando conexión segura...</div>
        </div>
    </div>

    <script>
        // Tus credenciales reales verificadas del proyecto deltascripts-1
        const firebaseConfig = {
            apiKey: "AIzaSyCyxJWklgJAAMwmhSw9jF3CMsJXbF99CeA",
            authDomain: "://firebaseapp.com",
            projectId: "deltascripts-1",
            storageBucket: "deltascripts-1.firebasestorage.app",
            messagingSenderId: "735316669110",
            appId: "1:735316669110:web:33f580d583a462ee2cac17",
            measurementId: "G-90E1DSBCWY"
        };

        // Función de arranque seguro e inmediato
        (function() {
            const statusElemento = document.getElementById('db-status');
            const contenedor = document.getElementById('contenedor-principal');

            if (typeof firebase === 'undefined') {
                statusElemento.style.background = "#331111";
                statusElemento.style.color = "#ff4444";
                statusElemento.innerText = "Error: Google Firebase no pudo ser descargado por tu navegador. Intenta recargar la página.";
                return;
            }

            try {
                // Inicializar Firebase globalmente
                firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                
                statusElemento.innerText = "Conectado con éxito. Buscando tus scripts...";

                // Consultar la base de datos de manera directa
                db.collection("scripts").get().then((respuesta) => {
                    if (respuesta.empty) {
                        contenedor.innerHTML = "<div class='status' style='background: #332200; color: #ffaa00;'>Conectado a Firebase, pero tu colección 'scripts' está vacía en el panel de Google.</div>";
                        return;
                    }

                    // Limpiar pantalla y renderizar las tarjetas de scripts encontrados
                    contenedor.innerHTML = "";
                    respuesta.forEach((doc) => {
                        const item = doc.data();
                        contenedor.innerHTML += `
                            <div style="background: #161622; padding: 20px; border-radius: 8px; margin-top: 15px; text-align: left; border: 1px solid #2a2a3a;">
                                <h3 style="color: #00ff88; margin: 0 0 10px 0; font-size: 1.3rem;">${item.nombre || 'Script sin nombre'}</h3>
                                <pre style="background: #000; color: #00ff88; padding: 15px; border-radius: 6px; overflow-x: auto; font-family: monospace; border: 1px solid #111;"><code>${item.contenido || '-- Vacío'}</code></pre>
                            </div>
                        `;
                    });
                }).catch((errorReglas) => {
                    statusElemento.style.background = "#331111";
                    statusElemento.style.color = "#ff4444";
                    statusElemento.innerText = "Bloqueo de seguridad de Firebase: " + errorReglas.message;
                });

            } catch (errorArranque) {
                statusElemento.style.background = "#331111";
                statusElemento.style.color = "#ff4444";
                statusElemento.innerText = "Error de inicialización: " + errorArranque.message;
            }
        })();
    </script>

</body>
</html>
