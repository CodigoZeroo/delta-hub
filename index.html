<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <!-- Aquí se mostrarán tus scripts de Roblox automáticamente -->
        <div id="lista-scripts">
            <div class="status" id="db-status">Buscando scripts en Firebase...</div>
        </div>
    </div>

    <!-- CONFIGURACIÓN DE GOOGLE FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, getDocs } from "https://gstatic.com";

        // Tus credenciales reales de deltascripts-1
        const firebaseConfig = {
            apiKey: "AIzaSyCyxJWklgJAAMwmhSw9jF3CMsJXbF99CeA",
            authDomain: "://firebaseapp.com",
            projectId: "deltascripts-1",
            storageBucket: "deltascripts-1.firebasestorage.app",
            messagingSenderId: "735316669110",
            appId: "1:735316669110:web:33f580d583a462ee2cac17",
            measurementId: "G-90E1DSBCWY"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNCIÓN PARA LEER TUS SCRIPTS
        async function cargarScripts() {
            const contenedor = document.getElementById('lista-scripts');
            try {
                // Buscamos la colección llamada "scripts" que creaste
                const querySnapshot = await getDocs(collection(db, "scripts"));
                
                // Si la base de datos está vacía
                if (querySnapshot.empty) {
                    contenedor.innerHTML = "<div class='status'>Conectado a Firebase, pero no hay scripts guardados aún.</div>";
                    return;
                }

                // Si encuentra scripts, los dibuja en la pantalla
                contenedor.innerHTML = ""; 
                querySnapshot.forEach((doc) => {
                    const datos = doc.data();
                    contenedor.innerHTML += `
                        <div style="background: #1e1e2a; padding: 20px; border-radius: 8px; margin-top: 15px; text-align: left; border: 1px solid #333;">
                            <h3 style="color: #00ff88; margin-top: 0;">${datos.nombre || 'Script sin nombre'}</h3>
                            <pre style="background: #000; color: #fff; padding: 10px; border-radius: 5px; overflow-x: auto;"><code>${datos.contenido || '-- Sin contenido'}</code></pre>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error original de Firebase:", error);
                contenedor.innerHTML = `<div class='status' style='color: #ff4444;'>Error de conexión: ${error.message}</div>`;
            }
        }

        // Ejecutar la búsqueda al cargar la página
        cargarScripts();
    </script>

</body>
</html>
