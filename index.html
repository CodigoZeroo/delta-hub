<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos rápidos para las tarjetas de tus scripts */
        .script-card {
            background: #161622; 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 20px; 
            text-align: left; 
            border: 1px solid #2a2a3a;
        }
        .script-title {
            color: #00ff88; 
            margin: 0 0 10px 0; 
            font-size: 1.3rem;
        }
        .script-box {
            background: #000; 
            color: #00ff88; 
            padding: 15px; 
            border-radius: 6px; 
            overflow-x: auto; 
            font-family: monospace; 
            border: 1px solid #111;
            white-space: pre-wrap;
        }
        .btn-copy {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-copy:hover {
            background: #00cc6a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Delta Scripts Hub</h1>
        <p>Tu catálogo de scripts para Roblox.</p>
        
        <!-- Tarjeta del Script 1 (Puedes cambiar este texto por tus scripts reales) -->
        <div class="script-card">
            <h3 class="script-title">🚀 Delta Executor Auto-Farm</h3>
            <div class="script-box" id="script1">loadstring(game:HttpGet("https://githubusercontent.com"))()</div>
            <button class="btn-copy" onclick="copiarScript('script1')">Copiar Script</button>
        </div>

        <!-- Tarjeta del Script 2 -->
        <div class="script-card">
            <h3 class="script-title">🛡️ Fly & Noclip Hack</h3>
            <div class="script-box" id="script2">loadstring(game:HttpGet("https://githubusercontent.com"))()</div>
            <button class="btn-copy" onclick="copiarScript('script2')">Copiar Script</button>
        </div>
    </div>

    <script>
        // Función rápida para que tus usuarios copien el script con un botón
        function copiarScript(id) {
            const codigo = document.getElementById(id).innerText;
            navigator.clipboard.writeText(codigo);
            alert("¡Script copiado al portapapeles con éxito!");
        }
    </script>

</body>
</html>
